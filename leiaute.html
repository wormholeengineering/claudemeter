<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClaudeMeter — 160x128</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #0a0a0a;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
  font-family: 'Montserrat', Arial, sans-serif;
}

/* Escala 4x: 160px->640px, 128px->512px */
.screen {
  width: 640px;
  height: 512px;
  background: #141414;
  position: relative;
  overflow: hidden;
  border-radius: 6px;
  box-shadow: 0 0 60px rgba(0,0,0,0.9), 0 0 0 2px #2a2a2a;
}

/* Topbar 18px -> 72px */
.topbar {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 72px;
  background: #1A1A1A;
  display: flex;
  align-items: center;
  justify-content: center;
}

.title {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 20px;
  font-weight: 700;
  color: #E8E8E8;
  letter-spacing: 0.18em;
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  white-space: nowrap;
}
.heartbeat {
  width: 13px; height: 13px;
  border-radius: 50%;
  background: #26D24E;
  flex-shrink: 0;
}

.wifi {
  position: absolute;
  left: 20px;
  bottom: 14px;
  display: flex;
  align-items: flex-end;
  gap: 5px;
}
.wifi-bar { width: 9px; border-radius: 2px; }

.battery {
  position: absolute;
  right: 16px;
  display: flex;
  align-items: center;
}

/* Area de conteudo */
.content {
  position: absolute;
  top: 72px; left: 0; right: 0; bottom: 0;
  display: flex;
  overflow: hidden;
}

/* Sessao (esquerda 97px->388px) */
.session-section {
  flex: 0 0 388px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding-bottom: 4px;
}

.arc-wrap {
  position: relative;
  width: 272px;
  height: 272px;
}
.arc-wrap svg { width: 100%; height: 100%; }
.arc-pct {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #E8E8E8;
  font-size: 80px;
  font-weight: 700;
}

.session-label {
  color: #606060;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  margin-top: 8px;
  text-align: center;
}
.session-time {
  color: #E07040;
  font-size: 22px;
  font-weight: 600;
  margin-top: 4px;
  text-align: center;
}

/* Weekly + Extra (direita 63px->252px) */
.right-section {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  padding-right: 12px;
}

.weekly-block {
  flex: 0 0 auto;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  padding-top: 12px;
  padding-bottom: 12px;
  gap: 5px;
}

.weekly-label {
  color: #606060;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.28em;
  text-transform: uppercase;
}

.weekly-arc-row {
  display: flex;
  align-items: center;
  gap: 10px;
  justify-content: flex-end;
}

.weekly-pct {
  color: #E8E8E8;
  font-size: 34px;
  font-weight: 700;
}

.weekly-arc svg { width: 56px; height: 56px; }

.weekly-reset {
  color: #A0A0A0;
  font-size: 14px;
  font-weight: 500;
  letter-spacing: 0.08em;
}

.hdivider {
  height: 2px;
  background: #2A2A2A;
}

.extra-block {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  justify-content: center;
  gap: 5px;
}

.extra-label {
  color: #606060;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.28em;
  text-transform: uppercase;
}

.extra-value {
  color: #26D24E;
  font-size: 30px;
  font-weight: 700;
}
</style>
</head>
<body>
<div class="screen">

  <div class="topbar">
    <div class="wifi">
      <div class="wifi-bar" style="height:12px; background:#2A2A2A"></div>
      <div class="wifi-bar" style="height:20px; background:#2A2A2A"></div>
      <div class="wifi-bar" style="height:28px; background:#606060"></div>
    </div>
    <div class="title">
      <span>CLAUDE</span>
      <div class="heartbeat"></div>
      <span>WATCH</span>
    </div>
    <div class="battery">
      <svg viewBox="0 0 42 22" fill="none" xmlns="http://www.w3.org/2000/svg" width="42" height="22">
        <rect x="1" y="3" width="34" height="16" rx="2.5" stroke="#606060" stroke-width="2"/>
        <rect x="3" y="5.5" width="20" height="11" rx="1" fill="#606060"/>
        <path d="M36 9v4" stroke="#606060" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </div>
  </div>

  <div class="content">

    <div class="session-section">
      <div class="arc-wrap">
        <!-- r=118, circunferencia=741.4; 85%=630.2 -->
        <svg viewBox="0 0 272 272" xmlns="http://www.w3.org/2000/svg">
          <circle cx="136" cy="136" r="118" fill="none" stroke="#2A2A2A" stroke-width="28"/>
          <circle cx="136" cy="136" r="118" fill="none" stroke="#E07040" stroke-width="28"
            stroke-dasharray="630.2 741.4" stroke-dashoffset="0"
            stroke-linecap="round" transform="rotate(-90 136 136)"/>
        </svg>
        <div class="arc-pct">85%</div>
      </div>
      <div class="session-label">Sessao</div>
      <div class="session-time">2h 14m</div>
    </div>

    <div class="right-section">

      <div class="weekly-block">
        <div class="weekly-label">Weekly</div>
        <div class="weekly-arc-row">
          <!-- r=22, circunferencia=138.2; 41%=56.7 -->
          <div class="weekly-arc">
            <svg viewBox="0 0 56 56" xmlns="http://www.w3.org/2000/svg">
              <circle cx="28" cy="28" r="22" fill="none" stroke="#2A2A2A" stroke-width="8"/>
              <circle cx="28" cy="28" r="22" fill="none" stroke="#E8E8E8" stroke-width="8"
                stroke-dasharray="56.7 138.2" stroke-dashoffset="0"
                stroke-linecap="round" transform="rotate(-90 28 28)"/>
            </svg>
          </div>
          <div class="weekly-pct">41%</div>
        </div>
        <div class="weekly-reset">SEG 09:00</div>
      </div>

      <div class="hdivider"></div>

      <div class="extra-block">
        <div class="extra-label">Extra</div>
        <div class="extra-value">R$4,20</div>
      </div>

    </div>
  </div>
</div>
</body>
</html>
